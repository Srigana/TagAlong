name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tagalong
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tagalong
      REDIS_URL: redis://localhost:6379
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      SECRET_KEY: test-secret-key-for-ci
      STRIPE_SECRET_KEY: sk_test_dummy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Load database schema
        run: |
          psql postgresql://postgres:postgres@localhost:5432/tagalong < db/schema.sql
          psql postgresql://postgres:postgres@localhost:5432/tagalong -c "ALTER TABLE posts ADD COLUMN start_lat DECIMAL(9,6);"
          psql postgresql://postgres:postgres@localhost:5432/tagalong -c "ALTER TABLE posts ADD COLUMN start_lng DECIMAL(9,6);"
          psql postgresql://postgres:postgres@localhost:5432/tagalong -c "ALTER TABLE users ADD COLUMN password_hash VARCHAR(255);"
          psql postgresql://postgres:postgres@localhost:5432/tagalong -c "CREATE TABLE ratings (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), trip_request_id UUID REFERENCES requests(id), rater_id UUID REFERENCES users(id), rated_id UUID REFERENCES users(id), score INTEGER CHECK (score BETWEEN 1 AND 5), created_at TIMESTAMP DEFAULT NOW());"
          psql postgresql://postgres:postgres@localhost:5432/tagalong -c "CREATE TABLE messages (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), request_id UUID REFERENCES requests(id), sender_id UUID REFERENCES users(id), content TEXT NOT NULL, created_at TIMESTAMP DEFAULT NOW());"

      - name: Run tests
        run: pytest tests/ -v